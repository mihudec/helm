apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector.envConfigMapName" . }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.envConfig | nindent 2 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vector.envSecretName" . }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
type: Opaque
data:
  {{- toYaml .Values.secretEnv | nindent 2 }}
{{- if .Values.configMap.create }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector.configMapName" . }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.config | nindent 2 }}
{{- end }}
{{- if .Values.scriptsConfigMap.create }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector.scriptsConfigMapName" . }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.scripts | nindent 2 }}
{{- end }}
{{- if .Values.enrichmentsConfigMap.create }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vector.enrichmentsConfigMapName" . }}
  labels:
    {{- include "vector.labels" . | nindent 4 }}
data:
  {{- toYaml .Values.enrichments | nindent 2 }}
{{- end }}
